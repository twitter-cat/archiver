<!doctype html>
<html lang="en">
  <!--
  this archive has been user-generated using TwitterArchiver

  we are not affiliated with twitter or responsable for any content in the
  archives created with this tool. we can not moderate or remove content from
  these archives, please use them responsibly and respect people's privacy.

  https://github.com/twitter-cat/twitterarchiver
  -->
  <head>
    <title>twitter.cat archive viewer</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      @font-face {
        font-family: "Chirp";
        src: url("./fonts/chirp.woff2"),
          url("https://twitter.cat/assets/fonts/chirp.woff2");
        font-weight: 400;
        font-display: swap;
      }
      @font-face {
        font-family: "Chirp";
        src: url("./fonts/chirpbold.woff2"),
          url("https://twitter.cat/assets/fonts/chirpbold.woff2");
        font-weight: 700;
        font-display: swap;
      }
      @font-face {
        font-family: "Chirp";
        src: url("./fonts/chirpheavy.woff2"),
          url("https://twitter.cat/assets/fonts/chirpheavy.woff2");
        font-weight: 900;
        font-display: swap;
      }

      :root {
        --white: #e7e9ea;
        --blue: #1d9bf0;
        --grey: #71767b;
        --border: #2f3336;
        --sans: "Chirp", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji", sans-serif;
      }

      body {
        font-family: var(--sans);
        display: flex;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        background: #14171a;
        color: var(--white);
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: hsla(255 0 255 / 15%) #14171a;
      }

      .page {
        width: min(90vw, 700px);
        padding: 40px 0;
      }

      :any-link {
        color: var(--blue);
        text-decoration: none;
        cursor: pointer !important;
      }

      .header {
        margin-bottom: 32px;
        user-select: none;
      }

      .profile {
        display: flex;
        align-items: center;
        gap: 14px;
        margin: 18px 0 10px;
      }

      .profile-avatar {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        flex-shrink: 0;
        background: var(--border);
        object-fit: cover;
        border: 1px solid var(--border);
      }

      .profile-meta .pname {
        font-size: 20px;
        font-weight: 800;
        line-height: 1.2;
      }

      .profile-meta .phandle {
        color: var(--grey);
        font-size: 15px;
      }

      .profile-meta .pcounts {
        color: var(--grey);
        font-size: 13px;
        margin-top: 4px;
        display: flex;
        gap: 14px;
      }

      .profile-meta .pcounts b {
        color: var(--white);
      }

      .title {
        font-size: 19px;
        font-weight: 600;
        margin-bottom: 4px;
      }

      .metadata {
        color: var(--grey);
        font-size: 15px;
        line-height: 1.6;
      }

      .metadata-item {
        margin: 0px;
      }

      .search {
        position: relative;
        margin: 24px 0;
        width: 100%;
        margin-top: 12px;
      }

      .searchicon {
        position: absolute;
        left: 18px;
        top: 50%;
        transform: translateY(-50%);
        width: 18px;
        height: 18px;
        opacity: 0.5;
        pointer-events: none;
      }

      .searchbar {
        width: 100%;
        height: 44px;
        padding: 0 16px 0 48px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--white);
        font-family: inherit;
        font-size: 15px;
        caret-color: var(--blue);
        box-sizing: border-box;
      }

      .searchbar::placeholder {
        color: var(--grey);
      }

      .searchbar:focus {
        outline: none;
        border-color: var(--blue);
      }

      .tweet {
        display: block;
        position: relative;
        padding: 12px;
        border-bottom: 1px solid transparent;
        border-image: linear-gradient(
          to right,
          black 0%,
          rgb(47, 51, 54) 5% 95%,
          black 100%
        );
        border-image-slice: 1;
      }

      .tweet-row {
        display: flex;
      }

      .avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        margin-right: 12px;
        flex-shrink: 0;
        background: var(--border);
        object-fit: cover;
      }

      .content {
        flex: 1;
        min-width: 0;
      }

      .author {
        display: flex;
        align-items: baseline;
        flex-wrap: wrap;
        gap: 4px;
        margin-bottom: 2px;
        font-size: 15px;
      }

      .author .name {
        font-weight: 700;
        color: var(--white);
      }

      .author .name:hover {
        text-decoration: underline;
      }

      .author .handle {
        color: var(--grey);
      }

      .author .sep {
        color: var(--grey);
      }

      .date {
        color: var(--grey);
        font-size: 15px;
      }

      .replying {
        color: var(--grey);
        font-size: 15px;
        margin-bottom: 2px;
      }

      .id a {
        color: #cacaca;
        text-decoration: underline;
        text-underline-offset: 3px;
        text-decoration-color: gray;
        text-decoration-style: dotted;

        &:hover {
          color: var(--blue);
          text-decoration: none;
        }
      }

      .text {
        color: var(--white);
        font-size: 15px;
        line-height: 20px;
        margin-bottom: 12px;
        white-space: pre-wrap;
        word-wrap: break-word;
      }

      .tweet-media {
        margin-top: 12px;
        overflow: hidden;
        margin-bottom: 12px;
        display: grid;
        gap: 2px;
        grid-template-columns: 1fr 1fr;
        max-width: 425px;
        border-radius: 16px;
        border: 1px solid #71767b59;
      }

      .tweet-media.count-1 {
        grid-template-columns: 1fr;
      }

      .tweet-media.count-3 .m:first-child {
        grid-row: span 2;
      }

      .tweet-media .m {
        position: relative;
        margin: 0;
        min-height: 0;
        overflow: hidden;
        background: #000;
      }

      .tweet-media.count-1 .m {
        max-height: 510px;
      }

      .tweet-media:not(.count-1) .m {
        aspect-ratio: 16 / 10;
      }

      .tweet-media img,
      .tweet-media video {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        background: #000;
      }

      .tweet-media.count-1 img,
      .tweet-media.count-1 video {
        max-height: 510px;
        object-fit: contain;
      }

      .quote {
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 12px;
        margin: 4px 0 12px;
      }

      .quote .author {
        font-size: 14px;
      }

      .quote .avatar-sm {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        margin-right: 2px;
        vertical-align: middle;
        background: var(--border);
        object-fit: cover;
      }

      .quote .text {
        font-size: 14px;
        margin-bottom: 8px;
      }

      .quote .tweet-media {
        margin-top: 8px;
        margin-bottom: 0;
      }

      .quote-unavailable {
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 12px;
        margin: 4px 0 12px;
        color: var(--grey);
        font-size: 14px;
      }

      .actions {
        display: flex;
        justify-content: space-between;
        max-width: 425px;
        margin-top: -7.5px;
        margin-left: -7.5px;
      }

      .action {
        display: flex;
        align-items: center;
        color: var(--grey);
        user-select: none;
        background: none;
        border: none;
        padding: 0;
        font-size: 13px;
        font-family: inherit;
        min-width: 60px;
      }

      .action span:last-child {
        min-width: 30px;
        text-align: left;
      }

      .actionicon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 34px;
        height: 34px;
        border-radius: 50%;
      }

      svg {
        width: 18.75px;
        height: 18.75px;
        fill: currentColor;
      }

      .info {
        position: absolute;
        text-align: right;
        right: 12px;
        top: 12px;
        font-size: 11px;
        color: var(--grey);
        display: flex;
        flex-direction: column;
        gap: 4px;
        align-items: flex-end;
      }

      .info a {
        color: #cacaca;
        text-decoration: underline;
        text-underline-offset: 3px;
        text-decoration-color: gray;
        text-decoration-style: dotted;
      }

      .info a:hover {
        color: var(--blue);
        text-decoration: none;
      }

      .tabs {
        display: flex;
        border-bottom: 1px solid var(--border);
        margin-bottom: 4px;
        position: sticky;
        top: 0;
        background: #14171a;
        z-index: 5;
      }

      .tab {
        flex: 1;
        text-align: center;
        padding: 14px 0;
        color: var(--grey);
        font-size: 15px;
        font-weight: 600;
        background: none;
        border: none;
        font-family: inherit;
        cursor: pointer;
        position: relative;
      }

      .tab:hover {
        background: rgba(231, 233, 234, 0.05);
      }

      .tab.active {
        color: var(--white);
      }

      .tab.active::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 56px;
        height: 4px;
        border-radius: 999px;
        background: var(--blue);
      }

      .repost-banner {
        display: flex;
        align-items: center;
        gap: 6px;
        color: var(--grey);
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 4px;
        margin-left: 8px;
      }

      .repost-banner svg {
        width: 15px;
        height: 15px;
      }

      .community-note {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        margin: 4px 0 12px;
        background: rgba(231, 233, 234, 0.03);
      }

      .community-note .cn-title {
        display: flex;
        align-items: center;
        gap: 6px;
        font-weight: 700;
        font-size: 14px;
        margin-bottom: 4px;
      }

      .community-note .cn-title svg {
        width: 16px;
        height: 16px;
      }

      .community-note .cn-body {
        font-size: 14px;
        line-height: 19px;
        color: var(--white);
        white-space: pre-wrap;
        word-wrap: break-word;
      }

      .empty {
        text-align: center;
        padding: 48px 20px;
        color: var(--grey);
      }

      .loading {
        text-align: center;
        padding: 20px;
        color: var(--grey);
      }

      .error {
        padding: 16px;
        background: rgba(255, 0, 0, 0.12);
        border: 1px solid #7a0000;
        border-radius: 10px;
        margin: 20px 0;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="header">
        <a href="https://twitter.cat" target="_blank">
          <img
            src="https://twitter.cat/assets/svgs/kitty.svg"
            draggable="false"
            alt="kitty !!"
            style="width: 38px; margin-bottom: 12px"
          />
        </a>
        <div class="profile" id="profile" style="display: none"></div>
        <div class="title">loading archive…</div>
        <div class="metadata" id="metadata"></div>
      </div>

      <div class="search">
        <svg
          class="searchicon"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
        >
          <path
            d="M10.3 3.8a6.5 6.5 0 1 0 0 13 6.5 6.5 0 0 0 0-13m-8.5 6.5a8.5 8.5 0 1 1 15.1 5.2l4.8 4.8-1.4 1.4-4.8-4.8a8.5 8.5 0 0 1-13.7-6.6"
          />
        </svg>
        <input class="searchbar" placeholder="search" />
      </div>

      <div class="tabs" id="tabs">
        <button class="tab active" data-tab="tweets">tweets</button>
        <button class="tab" data-tab="replies">replies</button>
        <button class="tab" data-tab="media">media</button>
      </div>

      <div id="tweets" aria-live="polite"></div>
    </div>

    <script>
      const tweetsRoot = document.getElementById("tweets");
      const searchInput = document.querySelector(".searchbar");
      const metadataRoot = document.getElementById("metadata");

      let tweets = [];
      let filteredTweets = [];
      let renderedCount = 0;
      let loading = false;
      let metadata = {};
      let activeTab = "tweets";
      let searchQuery = "";

      const isReply = (t) => !!t.in_reply_to;
      const isRepost = (t) => !!t.retweet;
      const hasMedia = (t) =>
        (t.media?.length ?? 0) > 0 || (t.retweet?.media?.length ?? 0) > 0;

      function matchesTab(t) {
        if (activeTab === "replies") return isReply(t);
        if (activeTab === "media") return hasMedia(t);
        return !isReply(t);
      }

      function matchesSearch(t) {
        if (!searchQuery) return true;
        const src = t.retweet || t;
        const parts = [
          src.full_text,
          src.author?.name,
          src.author?.screen_name,
          t.community_note?.text,
          t.quote?.full_text,
          t.quote?.author?.name,
          t.quote?.author?.screen_name,
        ];
        return parts.join(" ").toLowerCase().includes(searchQuery);
      }

      init();

      async function init() {
        try {
          const metaResponse = await fetch("./metadata.json");
          metadata = await metaResponse.json();
          renderMetadata();

          tweets = await fetch("./tweets.json").then((res) => res.json());
          renderProfile();
          setupTabs();
          applyFilters();
          attachScrollListener();
          searchInput?.addEventListener("input", handleSearch);
        } catch (error) {
          tweetsRoot.innerHTML = `<div class="error">failed to read tweets${location.protocol === "file:" ? ". due to browser security limits, loading the viewer over the file protocol won't work. you'll need to serve it over http, for example using cloudflare pages or any local web server." : ""}</div>`;
          console.error(error);
        }
      }

      function renderMetadata() {
        const exported = new Date(metadata.exported_at).toLocaleString();
        document.querySelector(".title").textContent =
          `tweets by @${metadata.username}`;
        document.querySelector(".searchbar").placeholder =
          `search ${(metadata.tweet_count ?? 0).toLocaleString()} tweets, ${(metadata.media_count ?? 0).toLocaleString()} media`;
        metadataRoot.innerHTML = `<div class="metadata-item">archived ${exported} by <a href="https://github.com/twitter-cat/twitterarchiver" target="_blank">TwitterArchiver</a></div>do not use archives to doxx anyone.`;
      }

      function renderProfile() {
        const target = (metadata.username || "").toLowerCase();
        let author =
          tweets.find(
            (t) => (t.author?.screen_name || "").toLowerCase() === target,
          )?.author || tweets[0]?.author;
        if (!author) return;

        const mediaCount = metadata.media_count ?? 0;
        const el = document.getElementById("profile");
        el.style.display = "flex";
        el.innerHTML = `
          ${avatar(author, "profile-avatar")}
          <div class="profile-meta">
            <div class="pname">${escapeHtml(author.name || author.screen_name)}</div>
            <a class="phandle" href="https://x.com/${escapeAttr(author.screen_name)}" target="_blank">@${escapeHtml(author.screen_name)}</a>
            <div class="pcounts">
              <span><b>${(metadata.tweet_count ?? tweets.length).toLocaleString()}</b> tweets</span>
              <span><b>${mediaCount.toLocaleString()}</b> media</span>
              ${author.id ? `<span>id <b>${escapeHtml(author.id)}</b></span>` : ""}
            </div>
          </div>
        `;
      }

      function setupTabs() {
        const counts = { tweets: 0, replies: 0, media: 0 };
        for (const t of tweets) {
          if (!isReply(t)) counts.tweets++;
          if (isReply(t)) counts.replies++;
          if (hasMedia(t)) counts.media++;
        }
        const tabsEl = document.getElementById("tabs");
        tabsEl.querySelectorAll(".tab").forEach((btn) => {
          const key = btn.dataset.tab;
          btn.textContent = `${key} ${formatNumber(counts[key])}`;
          btn.addEventListener("click", () => {
            if (activeTab === key) {
              window.scrollTo({ top: 0, behavior: "smooth" });
              return;
            }
            activeTab = key;
            tabsEl
              .querySelectorAll(".tab")
              .forEach((b) => b.classList.toggle("active", b === btn));
            window.scrollTo({ top: 0 });
            applyFilters();
          });
        });
      }

      function applyFilters() {
        filteredTweets = tweets.filter(
          (t) => matchesTab(t) && matchesSearch(t),
        );
        renderedCount = 0;
        tweetsRoot.innerHTML = "";
        if (filteredTweets.length === 0) {
          tweetsRoot.innerHTML = `<div class="empty">no ${activeTab}${searchQuery ? " match your search" : " in this archive"}</div>`;
          return;
        }
        renderNextPage(true);
      }

      function handleSearch(e) {
        searchQuery = e.target.value.toLowerCase().trim();
        applyFilters();
      }

      function attachScrollListener() {
        window.addEventListener("scroll", () => {
          if (loading) return;
          const { scrollTop, scrollHeight, clientHeight } =
            document.documentElement;
          if (scrollTop + clientHeight >= scrollHeight - 200) {
            renderNextPage();
          }
        });
      }

      function renderNextPage(force = false) {
        if (loading) return;
        if (!force && renderedCount >= filteredTweets.length) return;

        loading = true;
        const fragment = document.createDocumentFragment();
        const targetCount = Math.min(filteredTweets.length, renderedCount + 25);

        for (let i = renderedCount; i < targetCount; i++) {
          fragment.appendChild(createTweet(filteredTweets[i]));
        }

        tweetsRoot.appendChild(fragment);
        renderedCount = targetCount;
        loading = false;
      }

      function avatar(author, cls) {
        if (!author) return "";
        const remote = fullSizePfp(author.profile_image_url || "");
        const local = author.profile_image_file || "";
        const onerror = remote
          ? ` onerror="this.onerror=null;this.src='${escapeAttr(remote)}'"`
          : "";
        const src = local || remote;
        if (!src) return `<span class="${cls}"></span>`;
        return `<img class="${cls}" src="${escapeAttr(src)}" alt="" loading="lazy"${onerror} />`;
      }

      function authorLine(author, dateStr, inline) {
        if (!author) return "";
        const handle = author.screen_name
          ? `<a class="handle" href="https://x.com/${escapeAttr(author.screen_name)}" target="_blank">@${escapeHtml(author.screen_name)}</a>`
          : "";
        const name = author.name
          ? `<a class="name" href="https://x.com/${escapeAttr(author.screen_name)}" target="_blank">${escapeHtml(author.name)}</a>`
          : "";
        const date = dateStr
          ? `<span class="sep">·</span><span class="date">${formatDate(dateStr)}</span>`
          : "";
        const avatarHtml = inline
          ? avatar(author, "avatar-sm")
          : "";
        return `<div class="author">${avatarHtml}${name}${handle}${date}</div>`;
      }

      function repostBanner(reposter) {
        const icon =
          '<svg viewBox="0 0 24 24"><path d="M4.5 3.88 8.932 8.02l-1.364 1.46L5.5 7.55V16c0 1.1.896 2 2 2H13v2H7.5c-2.209 0-4-1.79-4-4V7.55L1.432 9.48.068 8.02 4.5 3.88zm12 2.12H11V4h5.5c2.209 0 4 1.79 4 4v8.45l2.068-1.93 1.364 1.46-4.432 4.14-4.432-4.14 1.364-1.46 2.068 1.93V8c0-1.1-.896-2-2-2z"></path></svg>';
        const who = reposter?.name || reposter?.screen_name || "someone";
        return `<div class="repost-banner">${icon}<span>${escapeHtml(who)} reposted</span></div>`;
      }

      function communityNote(note) {
        if (!note || !note.text) return "";
        const icon =
          '<svg viewBox="0 0 24 24"><path d="M12 1.75 21.5 7v10L12 22.25 2.5 17V7L12 1.75zM11 7v6h2V7h-2zm0 8v2h2v-2h-2z"></path></svg>';
        return `
          <div class="community-note">
            <div class="cn-title">${icon}<span>${escapeHtml(note.title || "readers added context")}</span></div>
            <div class="cn-body">${formatText(note.text)}</div>
          </div>
        `;
      }

      function createTweet(tweet) {
        const article = document.createElement("article");
        article.className = "tweet";

        const reposter = tweet.retweet ? tweet.author : null;
        const src = tweet.retweet || tweet;

        const mentions = src.entities?.user_mentions || [];
        let tweetText = src.full_text || "";
        if (mentions.length > 0) tweetText = cleanMentions(tweetText, mentions);

        const replyingTo = src.in_reply_to
          ? [{ screen_name: src.in_reply_to }]
          : [];

        article.innerHTML = `
          ${reposter ? repostBanner(reposter) : ""}
          <div class="tweet-row">
            ${avatar(src.author, "avatar")}
            <div class="content">
              ${authorLine(src.author, src.created_at, false)}
              ${replyingTo.length ? `<div class="replying">replying to ${formatMentions(replyingTo)}</div>` : ""}
              <div class="text">${formatText(tweetText)}</div>
              ${renderMedia(src.media)}
              ${renderQuote(src.quote)}
              ${communityNote(src.community_note)}
              <div class="actions">
                ${actionButton("reply", src.reply_count)}
                ${actionButton("retweet", src.retweet_count)}
                ${actionButton("like", src.favorite_count)}
                ${actionButton("views", src.views_count)}
              </div>
              <div class="info">
                <a href="https://x.com/i/status/${escapeAttr(src.id)}" target="_blank">view tweet</a>
                <span>${escapeHtml(src.author?.id || "")}</span>
              </div>
            </div>
          </div>
        `;

        return article;
      }

      function renderQuote(quote) {
        if (!quote) return "";
        if (quote.unavailable) {
          return `<div class="quote-unavailable">this quoted post is unavailable</div>`;
        }

        const mentions = quote.entities?.user_mentions || [];
        let text = quote.full_text || "";
        if (mentions.length > 0) text = cleanMentions(text, mentions);

        return `
          <div class="quote">
            ${authorLine(quote.author, quote.created_at, true)}
            <div class="text">${formatText(text)}</div>
            ${renderMedia(quote.media)}
            ${communityNote(quote.community_note)}
          </div>
        `;
      }

      function renderMedia(mediaArray) {
        if (!mediaArray || mediaArray.length === 0) return "";

        const mediaHtml = mediaArray
          .map((media) => {
            const local = media.file ? `./media/${media.file}` : "";
            const remote = media.display_remote || "";

            if (media.type === "photo") {
              const fallback = remote
                ? ` onerror="this.onerror=null;this.src='${escapeAttr(remote)}';this.parentElement.href='${escapeAttr(remote)}'"`
                : "";
              const src = local || remote;
              return `<div class="m"><a href="${escapeAttr(local || remote)}" target="_blank"><img src="${escapeAttr(src)}" alt="${escapeAttr(media.alt || "media")}" loading="lazy"${fallback} /></a></div>`;
            }

            if (media.type === "video" || media.type === "animated_gif") {
              const poster = media.poster_file
                ? `./media/${media.poster_file}`
                : "";
              const src = local || remote;
              const isGif = media.type === "animated_gif";
              const fallback = remote
                ? ` onerror="this.onerror=null;const s=this.querySelector('source');s.src='${escapeAttr(remote)}';this.load()"`
                : "";
              return `
                <div class="m">
                  <video
                    controls
                    preload="metadata"
                    ${poster ? `poster="${escapeAttr(poster)}"` : ""}
                    ${isGif ? "muted autoplay loop playsinline" : ""}
                    ${fallback}
                  >
                    <source src="${escapeAttr(src)}" type="video/mp4" />
                    your browser does not support the video tag.
                  </video>
                </div>
              `;
            }

            return "";
          })
          .join("");

        const count = Math.min(mediaArray.length, 4);
        return `<div class="tweet-media count-${count}">${mediaHtml}</div>`;
      }

      function cleanMentions(text, mentions) {
        let cleaned = text.trim();
        let changed = true;
        while (changed) {
          changed = false;
          for (const mention of mentions) {
            const pattern = new RegExp(`^@${mention.screen_name}\\s+`, "i");
            if (pattern.test(cleaned)) {
              cleaned = cleaned.replace(pattern, "").trim();
              changed = true;
              break;
            }
          }
        }
        return cleaned;
      }

      function formatMentions(mentions) {
        return mentions
          .map(
            (m) =>
              `<a href="https://x.com/${m.screen_name}" target="_blank">@${escapeHtml(m.screen_name)}</a>`,
          )
          .join(", ");
      }

      function formatText(text) {
        const escaped = escapeHtml(text);
        const linkified = escaped
          .replace(
            /(https?:\/\/[^\s]+)/g,
            '<a href="$1" target="_blank">$1</a>',
          )
          .replace(
            /(^|\s)@([\w_]+)/g,
            (_, space, handle) =>
              `${space}<a href="https://x.com/${handle}" target="_blank">@${handle}</a>`,
          )
          .replace(
            /(^|\s)#([\w_]+)/g,
            (_, space, tag) =>
              `${space}<a href="https://x.com/hashtag/${tag}" target="_blank">#${tag}</a>`,
          );
        return linkified.replace(/\n/g, "<br>");
      }

      function actionButton(type, count) {
        const icons = {
          reply:
            '<svg viewBox="0 0 24 24"><path d="M1.751 10c0-4.42 3.584-8 8.005-8h4.366c4.49 0 8.129 3.64 8.129 8.13 0 2.96-1.607 5.68-4.196 7.11l-8.054 4.46v-3.69h-.067c-4.49.1-8.183-3.51-8.183-8.01zm8.005-6c-3.317 0-6.005 2.69-6.005 6 0 3.37 2.77 6.08 6.138 6.01l.351-.01h1.761v2.3l5.087-2.81c1.951-1.08 3.163-3.13 3.163-5.36 0-3.39-2.744-6.13-6.129-6.13H9.756z"></path></svg>',
          retweet:
            '<svg viewBox="0 0 24 24"><path d="M4.5 3.88 8.932 8.02l-1.364 1.46L5.5 7.55V16c0 1.1.896 2 2 2H13v2H7.5c-2.209 0-4-1.79-4-4V7.55L1.432 9.48.068 8.02 4.5 3.88zm12 2.12H11V4h5.5c2.209 0 4 1.79 4 4v8.45l2.068-1.93 1.364 1.46-4.432 4.14-4.432-4.14 1.364-1.46 2.068 1.93V8c0-1.1-.896-2-2-2z"></path></svg>',
          like: '<svg viewBox="0 0 24 24"><path d="M16.697 5.5c-1.222-.06-2.679.51-3.89 2.16l-.805 1.09-.806-1.09C9.984 6.01 8.526 5.44 7.304 5.5c-1.243.07-2.349.78-2.91 1.91-.552 1.12-.633 2.78.479 4.82 1.074 1.97 3.257 4.27 7.129 6.61 3.87-2.34 6.052-4.64 7.126-6.61 1.111-2.04 1.03-3.7.477-4.82-.561-1.13-1.666-1.84-2.908-1.91zm4.187 7.69c-1.351 2.48-4.001 5.12-8.379 7.67l-.503.3-.504-.3c-4.379-2.55-7.029-5.19-8.382-7.67-1.36-2.5-1.41-4.86-.514-6.67.887-1.79 2.647-2.91 4.601-3.01 1.651-.09 3.368.56 4.798 2.01 1.429-1.45 3.146-2.1 4.796-2.01 1.954.1 3.714 1.22 4.601 3.01.896 1.81.846 4.17-.514 6.67z"></path></svg>',
          views:
            '<svg viewBox="0 0 24 24"><path d="M8.75 21V3h2v18h-2zM18 21V8.5h2V21h-2zM4 21l.004-10h2L6 21H4zm9.248 0v-7h2v7h-2z"></path></svg>',
        };

        const countNum = parseInt(count) || 0;
        const showCount = countNum > 0;

        return `
                <button class="action ${type}">
                    <span class="actionicon">${icons[type]}</span>
                    ${showCount ? `<span>${formatNumber(countNum)}</span>` : ""}
                </button>
            `;
      }

      function fullSizePfp(url) {
        return url ? url.replace("_normal", "") : url;
      }

      function escapeHtml(str) {
        const map = {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;",
        };
        return String(str ?? "").replace(/[&<>"']/g, (char) => map[char]);
      }

      function escapeAttr(str) {
        return String(str ?? "")
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function formatNumber(num) {
        return new Intl.NumberFormat("en", {
          notation: "compact",
          maximumFractionDigits: 1,
        }).format(num);
      }

      function formatDate(dateStr) {
        const date = new Date(dateStr);
        if (Number.isNaN(date.getTime())) return dateStr;
        const datePart = date.toLocaleDateString(undefined, {
          month: "short",
          day: "numeric",
          year: "numeric",
        });
        const timePart = date.toLocaleTimeString(undefined, {
          hour: "numeric",
          minute: "2-digit",
        });
        return `${datePart}, ${timePart}`;
      }
    </script>
