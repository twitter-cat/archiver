                height="16"

  <script>
    const loginButton = document.querySelector(".intro .primary");
    const startArchiveButton = document.querySelector(".start-archive");
    let authInterval, auth;
    let isArchiving = false;
    let isPaused = false;
    const archivedTweets = new Map();
    const fullTweetObjects = new Map();
    let scrollInterval = null;
    let currentUsername = null;

    const debounce = (callback, wait) => {
      let timeoutId = null;
      return (...args) => {
        window.clearTimeout(timeoutId);
        timeoutId = window.setTimeout(() => {
          callback(...args);
        }, wait);
      };
    };

    document.querySelector("main input").addEventListener("input", () => {
      const query = document.querySelector("main input").value;
      document.querySelector("main input").value = query
        .trim()
        .replaceAll("@", "")
        .replaceAll(" ", "");
    });

    document.querySelector("main input").addEventListener(
      "input",
      debounce(async () => {
        const query = document.querySelector("main input").value;
        const list = document.querySelector(".list");

        if (query === "") {
          list.innerHTML = "<p>start typing a username to find results</p>";
          return;
        }

        window.ipc.send("from-renderer", `query:${encodeURIComponent(query)}`);

        let ign;
        list.style.opacity = ".5";

        window.ipc.on("from-main", async (e) => {
          if (e.type === "search-results" && !ign) {
            const { data } = e;
            const dataJson = JSON.parse(data);
            list.style.opacity = "1";

            if (dataJson.query !== document.querySelector("main input").value)
              return;

            list.innerHTML = "";
            dataJson.res.forEach((user) => {
              const formatNumber = (n) => {
                if (n < 1_000) return `${n}`;

                if (n < 1_000_000) {
                  const v = n / 1_000;
                  return `${Number.isInteger(v) ? v : v.toFixed(1)}K`;
                }

                const v = n / 1_000_000;
                return `${Number.isInteger(v) ? v : v.toFixed(2)}M`;
              };

              const div = document.createElement("div");
              div.classList.add("user-item");
              div.innerHTML = `
            <img src="${user.profile_image_url_https.replace("_normal", "")}" loading="lazy" />
            <div>
            <p>${user.name.replaceAll("<", "").replaceAll(">", "")}</p>
            <span>@${user.screen_name}</span>

            <span class="stats"><b>${formatNumber(user.statuses_count)}</b> tweets</span>
            </div>
          `;

              if (user.protected) {
                const lock = document.createElement("span");
                lock.classList.add("lock-icon");
                lock.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" style="margin-bottom:-2px;margin-left:2px;" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-lock"><rect x="5" y="11" width="14" height="10" rx="2" /><circle cx="12" cy="16" r="1" /><path d="M8 11v-4a4 4 0 0 1 8 0v4" /></svg>`;
                div.querySelector("div p").appendChild(lock);
              }

              div.addEventListener("click", () => {
                if (
                  user.protected &&
                  !confirm("are you sure you wanna archive a private account?")
                )
                  return;
                const input = document.querySelector("main input");
                input.value = user.screen_name;
              });

              list.appendChild(div);
            });

            ign = true;
          }
        });
      }, 200),
    );

    startArchiveButton.addEventListener("click", async () => {
      const username = document.querySelector("main input").value.trim();
      if (!username) {
        document.querySelector("main input").focus();
        return;
      }

      currentUsername = username;
      window.ipc.send("from-renderer", `start-archiving:${username}`);
    });

    document
      .querySelector(".stop-archive-btn")
      .addEventListener("click", stopArchiving);

    document
      .querySelector(".pause-archive-btn")
      .addEventListener("click", togglePause);

    function togglePause() {
      isPaused = !isPaused;
      const btn = document.querySelector(".pause-archive-btn");
      const pauseIcon = btn.querySelector(".pause-icon");
      const playIcon = btn.querySelector(".play-icon");
      const pauseText = btn.querySelector(".pause-text");
      const progressIndicator = document.querySelector(".progress-indicator");
      const spinner = progressIndicator.querySelector(".spinner");
      const progressText = progressIndicator.querySelector(".progress-text");

      if (isPaused) {
        pauseIcon.style.display = "none";
        playIcon.style.display = "inline";
        pauseText.textContent = "resume";
        spinner.style.animationPlayState = "paused";
        progressText.textContent = "Paused";
      } else {
        pauseIcon.style.display = "inline";
        playIcon.style.display = "none";
        pauseText.textContent = "pause";
        spinner.style.animationPlayState = "running";
        progressText.textContent = "Scanning tweets...";
      }
    }

    function unwrapTweet(result) {
      if (!result) return null;
      if (result.__typename === "TweetWithVisibilityResults") {
        return result.tweet ?? null;
      }
      return result;
    }

    function fullSizePfp(url) {
      return url ? url.replace("_normal", "") : url;
    }

    function ymd(date) {
      const p = (n) => String(n).padStart(2, "0");
      return `${date.getUTCFullYear()}-${p(date.getUTCMonth() + 1)}-${p(date.getUTCDate())}`;
    }

    function extractUser(userResult) {
      if (!userResult) return null;
      const legacy = userResult.legacy ?? {};
      const core = userResult.core ?? {};
      const id = userResult.rest_id ?? legacy.id_str ?? "";
      const name = core.name ?? legacy.name ?? "";
      const screen_name = core.screen_name ?? legacy.screen_name ?? "";
      const profile_image_url =
        userResult.avatar?.image_url ?? legacy.profile_image_url_https ?? "";
      return {
        id,
        name,
        screen_name,
        profile_image_url,
        profile_image_file: id ? `pfps/${id}.jpg` : "",
      };
    }

    function tweetText(result, legacy) {
      return (
        result?.note_tweet?.note_tweet_results?.result?.text ??
        legacy?.full_text ??
        ""
      );
    }

    function extractMedia(legacy) {
      const media =
        legacy?.extended_entities?.media ?? legacy?.entities?.media ?? [];

      return media
        .map((m, i) => {
          const key = m.media_key ?? m.id_str ?? `${legacy?.id_str}-${i}`;
          const alt = m.ext_alt_text ?? "";

          if (m.type === "photo") {
            const ext = (m.media_url_https ?? "").includes(".png")
              ? "png"
              : "jpg";
            return {
              type: "photo",
              key,
              alt,
              file: `${key}.${ext}`,
              remote: `${m.media_url_https}?format=${ext}&name=orig`,
              display_remote: m.media_url_https,
            };
          }

          if (m.type === "video" || m.type === "animated_gif") {
            const variants = (m.video_info?.variants ?? []).filter(
              (v) => v.content_type === "video/mp4",
            );
            variants.sort((a, b) => (b.bitrate ?? 0) - (a.bitrate ?? 0));
            const best = variants[0];
            if (!best) return null;
            return {
              type: m.type,
              key,
              alt,
              file: `${key}.mp4`,
              remote: best.url,
              poster_file: `${key}-poster.jpg`,
              poster_remote: m.media_url_https,
              display_remote: best.url,
              aspect_ratio: m.video_info?.aspect_ratio ?? null,
            };
          }

          return null;
        })
        .filter(Boolean);
    }

    function communityNote(result) {
      const pivot = result?.birdwatch_pivot;
      const text = pivot?.subtitle?.text ?? "";
      if (!text) return null;
      return {
        title: pivot.title ?? "readers added context",
        text,
      };
    }

    function buildQuote(quotedRaw) {
      const quoted = unwrapTweet(quotedRaw);
      if (!quoted?.legacy) return { unavailable: true };
      return {
        id: quoted.legacy.id_str ?? quoted.rest_id,
        created_at: quoted.legacy.created_at,
        full_text: tweetText(quoted, quoted.legacy),
        entities: quoted.legacy.entities ?? {},
        author: extractUser(quoted.core?.user_results?.result),
        media: extractMedia(quoted.legacy),
        community_note: communityNote(quoted),
      };
    }

    function buildRecord(rawResult, depth = 0) {
      try {
        const result = unwrapTweet(rawResult);
        const legacy = result?.legacy;
        if (!result || !legacy) return null;

        const record = {
          id: legacy.id_str ?? result.rest_id,
          created_at: legacy.created_at,
          full_text: tweetText(result, legacy),
          lang: legacy.lang ?? "",
          source: result.source ?? "",
          reply_count: legacy.reply_count ?? 0,
          retweet_count: legacy.retweet_count ?? 0,
          favorite_count: legacy.favorite_count ?? 0,
          quote_count: legacy.quote_count ?? 0,
          bookmark_count: legacy.bookmark_count ?? 0,
          views_count: result.views?.count ?? "",
          possibly_sensitive: legacy.possibly_sensitive ?? false,
          in_reply_to: legacy.in_reply_to_screen_name ?? "",
          entities: legacy.entities ?? {},
          author: extractUser(result.core?.user_results?.result),
          media: extractMedia(legacy),
          community_note: communityNote(result),
          is_retweet: !!legacy.retweeted_status_result,
          retweet: null,
          quote: null,
        };

        const retweetedRaw = legacy.retweeted_status_result?.result;
        if (retweetedRaw && depth === 0) {
          record.retweet = buildRecord(retweetedRaw, depth + 1);
        }

        const quotedRaw = result.quoted_status_result?.result;
        if (quotedRaw) {
          record.quote = buildQuote(quotedRaw);
        }

        return record;
      } catch (err) {
        console.error("Error building tweet record:", err);
        return null;
      }
    }

    function collectDownloads(record, tasks) {
      const addPfp = (author) => {
        if (author?.profile_image_file && author.profile_image_url) {
          if (!tasks.has(author.profile_image_file)) {
            tasks.set(author.profile_image_file, fullSizePfp(author.profile_image_url));
          }
        }
      };
      const addMedia = (mediaList) => {
        for (const m of mediaList ?? []) {
          if (m.file && m.remote && !tasks.has(`media/${m.file}`)) {
            tasks.set(`media/${m.file}`, m.remote);
          }
          if (m.poster_file && m.poster_remote && !tasks.has(`media/${m.poster_file}`)) {
            tasks.set(`media/${m.poster_file}`, m.poster_remote);
          }
        }
      };

      const addTweet = (rec) => {
        if (!rec) return;
        addPfp(rec.author);
        addMedia(rec.media);
        if (rec.quote && !rec.quote.unavailable) {
          addPfp(rec.quote.author);
          addMedia(rec.quote.media);
        }
      };

      addTweet(record);
      addTweet(record.retweet);
    }

    async function fetchMediaAsBlob(url) {
      // Pull bytes through the main process / webview session: no CORS wall,
      // carries the auth cookies videos need, and reuses the partition cache
      // for anything the timeline already loaded.
      try {
        const bytes = await window.ipc.invoke("fetch-media", url);
        if (bytes && bytes.byteLength) return new Blob([bytes]);
      } catch (err) {
        console.error(`Failed to fetch media: ${url}`, err);
      }
      return null;
    }

    async function downloadExport() {
      if (fullTweetObjects.size === 0) {
        alert("no tweets to export!");
        return;
      }

      const progressText = document.querySelector(".progress-text");
      const spinner = document.querySelector(".spinner");
      spinner.style.animationPlayState = "running";
      progressText.textContent = "creating export...";

      const zip = new JSZip();

      progressText.textContent = "processing tweets...";

      const records = [];
      for (const raw of fullTweetObjects.values()) {
        const record = buildRecord(raw);
        if (record && isTargetAuthor(record)) records.push(record);
      }

      records.sort((a, b) => {
        try {
          return BigInt(b.id ?? 0) > BigInt(a.id ?? 0) ? 1 : -1;
        } catch {
          return 0;
        }
      });

      const tasks = new Map();
      for (const record of records) {
        collectDownloads(record, tasks);
      }

      const entries = [...tasks.entries()];
      const total = entries.length;
      let fetchedCount = 0;
      let cursor = 0;
      const concurrency = 8;

      const worker = async () => {
        while (cursor < entries.length) {
          const [file, url] = entries[cursor++];
          const blob = await fetchMediaAsBlob(url);
          if (blob) zip.file(file, blob);
          fetchedCount++;
          if (fetchedCount % 5 === 0 || fetchedCount === total) {
            progressText.textContent = `downloading media ${fetchedCount}/${total}...`;
          }
        }
      };

      await Promise.all(
        Array.from({ length: Math.min(concurrency, entries.length || 1) }, worker),
      );

      progressText.textContent = "writing tweets...";

      const tweetMediaCount = (r) =>
        (r.media?.length ?? 0) +
        (r.quote && !r.quote.unavailable ? (r.quote.media?.length ?? 0) : 0);
      const mediaCount = records.reduce(
        (sum, r) =>
          sum + tweetMediaCount(r) + (r.retweet ? tweetMediaCount(r.retweet) : 0),
        0,
      );

      zip.file("tweets.json", JSON.stringify(records));

      const metadata = {
        username: currentUsername,
        exported_at: new Date().toISOString().split(".")[0],
        tweet_count: records.length,
        media_count: mediaCount,
      };
      zip.file("metadata.json", JSON.stringify(metadata, null, 2));
      zip.file(
        "index.html",
        await (await fetch("./__viewer_template.html")).text(),
      );

      progressText.textContent = "bundling fonts...";
      const fontFiles = ["chirp.woff2", "chirpbold.woff2", "chirpheavy.woff2"];
      await Promise.all(
        fontFiles.map(async (name) => {
          const blob = await fetchMediaAsBlob(
            `https://twitter.cat/assets/fonts/${name}`,
          );
          if (blob) zip.file(`fonts/${name}`, blob);
        }),
      );

      progressText.textContent = "Generating zip file...";

      const zipBlob = await zip.generateAsync(
        {
          type: "blob",
          compression: "DEFLATE",
          compressionOptions: { level: 6 },
        },
        (meta) => {
          progressText.textContent = `compressing... ${Math.round(meta.percent)}%`;
        },
      );

      const url = URL.createObjectURL(zipBlob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${currentUsername}_archive_${new Date().toISOString().split("T")[0]}.zip`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      progressText.textContent = "Export complete!";
    }

    function goHome() {
      isArchiving = false;
      isPaused = false;
      if (scrollInterval) {
        clearInterval(scrollInterval);
        scrollInterval = null;
      }

      document.querySelector(".archive-container").style.display = "none";
      document.querySelector(".ui").style.display = "flex";
      document.querySelector(".archiving-ui").style.display = "none";

      const btn = document.querySelector(".pause-archive-btn");
      btn.querySelector(".pause-icon").style.display = "inline";
      btn.querySelector(".play-icon").style.display = "none";
      btn.querySelector(".pause-text").textContent = "pause";

      window.ipc.send("from-renderer", "shrink-window");

      const webview = document.getElementById("twitter-webview");
      webview.src = "about:blank";
    }

    async function stopArchiving() {
      // nothing captured yet: just stop and go home, no nagging.
      if (fullTweetObjects.size === 0) {
        goHome();
        return;
      }

      isPaused = true;
      if (scrollInterval) {
        clearInterval(scrollInterval);
        scrollInterval = null;
      }

      await downloadExport();
      goHome();
    }

    loginButton.addEventListener("click", async () => {
      const high = await navigator.userAgentData.getHighEntropyValues([
        "architecture",
        "platformVersion",
        "uaFullVersion",
      ]);

      window.ipc.send(
        "from-renderer",
        `start-auth:${encodeURIComponent(
          JSON.stringify({
            platform: navigator.userAgentData.platform,
            ...high,
          }),
        )}`,
      );

      authInterval = setInterval(() => {
        window.ipc.send("from-renderer", "request-auth");
      }, 300);
    });

    document.querySelector(".logout").addEventListener("click", async () => {
      const confirm = window.confirm("are you sure you want to log out?");

      if (!confirm) return;
      window.ipc.send("from-renderer", "logout");
      auth = null;

      document.body.querySelector(".intro").style.display = "flex";
      document.body.querySelector(".ui").style.display = "none";
    });

    window.ipc.on("from-main", async (e) => {
      if (e.type === "auth-cookies") {
        if (authInterval) clearInterval(authInterval);
        auth = e.data;

        document.body.querySelector(".intro").style.display = "none";
        document.body.querySelector(".ui").style.display = "flex";
      }

      if (e.type === "start-archive-webview") {
        const { username, userAgent } = JSON.parse(e.data);

        isArchiving = true;
        isPaused = false;
        archivedTweets.clear();
        fullTweetObjects.clear();

        document.querySelector(".ui").style.display = "none";
        document.querySelector(".archiving-ui").style.display = "flex";
        document.querySelector(".archiving-user .username").textContent =
          `@${username}`;
        document.querySelector(".tweet-count").textContent = "0";
        document.querySelector(".media-count").textContent = "0";
        document.querySelector(".tweet-list").innerHTML = "";

        document.querySelector(
          ".progress-indicator .spinner",
        ).style.animationPlayState = "running";
        document.querySelector(
          ".progress-indicator .progress-text",
        ).textContent = "scanning tweets...";

        window.ipc.send("from-renderer", "expand-window");

        const archiveContainer = document.querySelector(".archive-container");
        archiveContainer.style.display = "flex";

        const webview = document.getElementById("twitter-webview");

        webview.useragent = userAgent;

        webview.addEventListener("console-message", (e) => {
          if (e.message.startsWith("TWEET_DATA:")) {
            try {
              const data = JSON.parse(e.message.replace("TWEET_DATA:", ""));
              processTweetData(data);
            } catch (err) {
              console.error("Error parsing tweet data:", err);
            }
          } else if (e.message.startsWith("TWEET_RATELIMIT:")) {
            // payload is the x-rate-limit-reset epoch (seconds), or 0 if unknown.
            const reset = parseInt(e.message.slice(16), 10);
            const until = reset > 0 ? reset * 1000 : Date.now() + 60000;
            // honor the reset, but cap the wait in case of a bogus header.
            rateLimitUntil = Math.min(
              Date.now() + 16 * 60 * 1000,
              Math.max(rateLimitUntil, until),
            );
          }
        });

        const STALL_MS = 20000;
        const MAX_EMPTY_RELOADS = 3;
        const MAX_RL_WAITS = 6;

        // Search-only archive. Scroll the `from:user` timeline.
        //  - Rate limits are explicit: the API interceptor reads the 429 /
        //    errors-88 / x-rate-limit-* headers and sets rateLimitUntil to the
        //    reset epoch. We idle until then, reload, and keep going — this is
        //    NEVER treated as "done" (only bounded by MAX_RL_WAITS with no
        //    progress, as a stuck-account safety net).
        //  - A genuine stall (20s with no new posts and NO rate-limit signal)
        //    means we've likely hit the end: reload from where we left off, and
        //    after MAX_EMPTY_RELOADS such empty reloads in a row, stop.
        let rateLimitUntil = 0;
        let rlWaits = 0;
        let searchUntil = new Date(Date.now() + 86400000);
        let roundStartSize = 0;
        let lastSize = -1;
        let lastNewAt = Date.now();
        let emptyReloads = 0;
        let advancing = false;

        const setProgress = (text) => {
          const el = document.querySelector(".progress-text");
          if (el) el.textContent = text;
        };

        const oldestCapturedTs = () => {
          let min = Infinity;
          for (const r of archivedTweets.values()) {
            const ts = Date.parse(r?.created_at);
            if (!Number.isNaN(ts) && ts < min) min = ts;
          }
          return min;
        };

        const loadSearch = (label) => {
          advancing = true;
          roundStartSize = archivedTweets.size;
          lastSize = archivedTweets.size;
          lastNewAt = Date.now();
          // first round: plain newest-first search (boots the SPA cleanly).
          // later rounds: append the moving `until:` ceiling.
          const isFirst = searchUntil.getTime() > Date.now();
          const terms = isFirst
            ? `from:${username}`
            : `from:${username} until:${ymd(searchUntil)}`;
          const q = encodeURIComponent(terms);
          setProgress(label);
          webview.src = `https://x.com/search?q=${q}&src=typed_query&f=live`;
          setTimeout(() => {
            advancing = false;
          }, 3000);
        };

        // resume from the oldest post we have, so the reload continues deeper
        // rather than re-scrolling the part we already captured.
        const reloadDeeper = (label) => {
          const oldestTs = oldestCapturedTs();
          if (Number.isFinite(oldestTs)) searchUntil = new Date(oldestTs);
          loadSearch(label);
        };

        const finishScan = () => {
          clearInterval(scrollInterval);
          scrollInterval = null;
          setProgress(
            `done — found ${archivedTweets.size} posts. click finish to export`,
          );
        };

        const installInterceptor = () => {
          webview
            .executeJavaScript(`
          (function() {
            if (window.__interceptorInstalled) return;
            window.__interceptorInstalled = true;

            // search-only: we only ever drive SearchTimeline. ignoring other
            // endpoints means clicking into a tweet/profile won't pull in posts
            // from other people.
            const ENDPOINTS = /SearchTimeline/;

            const hasRateError = (data) => {
              const errs = data && data.errors;
              return Array.isArray(errs) && errs.some(
                (e) => e && (e.code === 88 || /rate limit|over capacity/i.test(e.message || "")),
              );
            };

            const originalFetch = window.fetch;
            window.fetch = async function(...args) {
              const response = await originalFetch.apply(this, args);
              const url = args[0]?.url || args[0];

              if (url && typeof url === 'string' && ENDPOINTS.test(url)) {
                let data = null;
                try {
                  const clone = response.clone();
                  data = await clone.json();
                  console.debug("TWEET_DATA:" + JSON.stringify(data));
                } catch (e) {}
                const remaining = response.headers.get('x-rate-limit-remaining');
                const reset = response.headers.get('x-rate-limit-reset');
                if (response.status === 429 || hasRateError(data) || remaining === '0') {
                  console.debug("TWEET_RATELIMIT:" + (reset || '0'));
                }
              }

              return response;
            };

            const originalXHROpen = XMLHttpRequest.prototype.open;
            const originalXHRSend = XMLHttpRequest.prototype.send;

            XMLHttpRequest.prototype.open = function(method, url, ...rest) {
              this._url = url;
              return originalXHROpen.call(this, method, url, ...rest);
            };

            XMLHttpRequest.prototype.send = function(...args) {
              this.addEventListener("load", function() {
                if (this._url && ENDPOINTS.test(this._url)) {
                  let data = null;
                  try {
                    data = JSON.parse(this.responseText);
                    console.debug("TWEET_DATA:" + JSON.stringify(data));
                  } catch (e) {}
                  const remaining = this.getResponseHeader('x-rate-limit-remaining');
                  const reset = this.getResponseHeader('x-rate-limit-reset');
                  if (this.status === 429 || hasRateError(data) || remaining === '0') {
                    console.debug("TWEET_RATELIMIT:" + (reset || '0'));
                  }
                }
              });
              return originalXHRSend.apply(this, args);
            };

            console.debug("interceptor installed!!");
          })();
        `)
            .catch(() => {});
        };

        // Re-inject on every navigation (each full load resets window, and the
        // in-page guard prevents double-install within one document).
        webview.addEventListener("dom-ready", () => {
          if (isArchiving) installInterceptor();
        });

        // scroll + flag X's "Retry"/"Try again" button (a visible rate-limit
        // cue, used only to label progress — the 20s timer drives the reload).
        const PROBE_JS = `(function(){
          window.scrollBy(0, 1400);
          var nodes = document.querySelectorAll('button,[role="button"],a');
          for (var i = 0; i < nodes.length; i++) {
            var t = (nodes[i].textContent || "").trim().toLowerCase();
            if (t === "retry" || t === "try again") return "1";
          }
          return "0";
        })()`;

        if (scrollInterval) clearInterval(scrollInterval);
        scrollInterval = setInterval(async () => {
          if (!isArchiving) {
            clearInterval(scrollInterval);
            scrollInterval = null;
            return;
          }
          if (isPaused || advancing) return;

          // rate limited (caught by the interceptor): idle until the reset, then
          // reload and continue. never counted toward the empty-reload stop.
          if (Date.now() < rateLimitUntil) {
            const secs = Math.ceil((rateLimitUntil - Date.now()) / 1000);
            setProgress(
              `rate limited — waiting ${secs}s for reset… ${archivedTweets.size} found`,
            );
            return;
          }
          if (rateLimitUntil) {
            rateLimitUntil = 0;
            if (++rlWaits > MAX_RL_WAITS) {
              finishScan();
              return;
            }
            reloadDeeper(`resuming after rate limit… ${archivedTweets.size} found`);
            return;
          }

          const probe = await webview
            .executeJavaScript(PROBE_JS)
            .catch(() => "0");

          const size = archivedTweets.size;
          if (size > lastSize) {
            lastSize = size;
            lastNewAt = Date.now();
            // any new post breaks both "we're stuck" streaks immediately, even
            // if the round is about to be interrupted by a rate-limit wait.
            rlWaits = 0;
            emptyReloads = 0;
          }

          // visible "Retry"/"Try again" button but no header signal: fall back
          // to a 60s wait (covers a throttle whose response we didn't intercept).
          if (probe === "1") {
            rateLimitUntil = Date.now() + 60000;
            return;
          }

          // still pulling in posts: keep scrolling.
          if (Date.now() - lastNewAt < STALL_MS) return;

          // 20s with no new posts and no rate-limit signal: likely the real end.
          // reload from the oldest we have and continue deeper if there's more.
          const newThisRound = size - roundStartSize;
          if (newThisRound > 0) {
            // (emptyReloads already zeroed when those posts arrived)
            reloadDeeper(`archiving history… ${size} found, continuing`);
            return;
          }

          // reload brought nothing new and we weren't throttled. after a few of
          // these in a row, the history really is exhausted -> stop.
          emptyReloads++;
          if (emptyReloads >= MAX_EMPTY_RELOADS) {
            finishScan();
            return;
          }
          reloadDeeper(
            `no new posts — retry ${emptyReloads}/${MAX_EMPTY_RELOADS}… ${size} found`,
          );
        }, 400);

        loadSearch(`archiving newest posts… ${archivedTweets.size} found`);
      }

      if (e.type === "archive-error") {
        alert("Error: " + e.data);
      }
    });

    function collectTweetResults(node, out, seen) {
      if (!node || typeof node !== "object") return;
      if (seen.has(node)) return;
      seen.add(node);

      if (Array.isArray(node)) {
        for (const item of node) collectTweetResults(item, out, seen);
        return;
      }

      for (const [key, value] of Object.entries(node)) {
        if (
          key === "tweet_results" &&
          value &&
          typeof value === "object" &&
          value.result
        ) {
          out.push(value.result);
        }
        if (value && typeof value === "object") {
          collectTweetResults(value, out, seen);
        }
      }
    }

    // Only keep posts actually authored by the target. Guards against stray
    // tweets pulled in when other endpoints fire (e.g. opening a conversation
    // shows replies from other people).
    function isTargetAuthor(record) {
      const target = (currentUsername || "").toLowerCase();
      const author = (record?.author?.screen_name || "").toLowerCase();
      return !!target && author === target;
    }

    function processTweetData(data) {
      try {
        const results = [];
        collectTweetResults(data, results, new WeakSet());

        for (const tweetResult of results) {
          const tweetId = getTweetId(tweetResult);
          if (!tweetId || archivedTweets.has(tweetId)) continue;

          const unwrapped = unwrapTweet(tweetResult);
          if (!unwrapped?.legacy) continue;

          const record = buildRecord(tweetResult);
          if (!isTargetAuthor(record)) continue;

          archivedTweets.set(tweetId, record);
          fullTweetObjects.set(tweetId, tweetResult);
          updateArchiveUI(record);
        }
      } catch (err) {
        console.error("Error processing tweet data:", err);
      }
    }

    function getTweetId(tweetResult) {
      try {
        if (tweetResult.__typename === "TweetWithVisibilityResults") {
          tweetResult = tweetResult.tweet;
        }
        return tweetResult?.legacy?.id_str || tweetResult?.rest_id;
      } catch {
        return null;
      }
    }

    function updateArchiveUI(tweet) {
      if (!tweet) return;

      document.querySelector(".tweet-count").textContent = archivedTweets.size;

      const tweetMediaCount = (r) =>
        (r.media?.length ?? 0) +
        (r.quote && !r.quote.unavailable ? (r.quote.media?.length ?? 0) : 0);
      let mediaCount = 0;
      for (const t of archivedTweets.values()) {
        if (!t) continue;
        mediaCount += tweetMediaCount(t);
        if (t.retweet) mediaCount += tweetMediaCount(t.retweet);
      }
      document.querySelector(".media-count").textContent = mediaCount;

      const tweetList = document.querySelector(".tweet-list");
      const tweetEl = document.createElement("div");
      tweetEl.classList.add("archived-tweet");

      const src = tweet.retweet || tweet;
      const fullText = src.full_text ?? "";
      const text =
        fullText.length > 100 ? fullText.substring(0, 100) + "..." : fullText;
      const date = new Date(src.created_at).toLocaleDateString("en-US", {
        month: "long",
        day: "numeric",
        year: "numeric",
      });

      const hasMedia =
        (src.media?.length ?? 0) > 0 ||
        (src.quote && !src.quote.unavailable && (src.quote.media?.length ?? 0) > 0);

      const esc = (s) =>
        (s ?? "").replaceAll("<", "&lt;").replaceAll(">", "&gt;");
      const author = src.author ?? {};
      const avatarUrl = author.profile_image_url
        ? fullSizePfp(author.profile_image_url)
        : "";

      tweetEl.innerHTML = `
      <div class="tweet-author">
        ${avatarUrl ? `<img class="avatar" src="${avatarUrl}" loading="lazy" />` : `<span class="avatar"></span>`}
        <div class="meta">
          <span class="name">${esc(author.name || author.screen_name || "unknown")}</span>
          <span class="sub">@${esc(author.screen_name || "")} · ${date}</span>
        </div>
        <div class="badges">
          ${tweet.retweet ? '<span class="has-media">🔁</span>' : ""}
          ${src.community_note ? '<span class="has-media">📝</span>' : ""}
          ${hasMedia ? '<span class="has-media">📷</span>' : ""}
          ${src.quote ? '<span class="has-media">❝</span>' : ""}
        </div>
      </div>
      <p class="tweet-text">${esc(text)}</p>
    `;

      tweetList.insertBefore(tweetEl, tweetList.firstChild);

      while (tweetList.children.length > 500) {
        tweetList.removeChild(tweetList.lastChild);
      }
    }

    window.ipc.send("from-renderer", "request-auth");
    setTimeout(() => {
      document.querySelector(".intro").style.opacity = 1;
      document.querySelector(".intro").style.filter = "blur(0px)";
      document.querySelector("main input").focus();
    }, 100);

    window.addEventListener("blur", () => {
      document.body.classList.add("unfocused");
    });

    window.addEventListener("focus", () => {
      document.body.classList.remove("unfocused");
    });
  </script>
</html>
